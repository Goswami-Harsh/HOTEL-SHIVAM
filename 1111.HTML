<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Hotel Shivam</title>

<link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;500;700&display=swap" rel="stylesheet">

<style>
* {
  margin: 0;
  padding: 0;
  box-sizing: border-box;
  font-family: 'Poppins', sans-serif;
}

body {
  background: #fafafa;
}

/* HEADER */
header {
  background: #8b0000;
  color: white;
  text-align: center;
  padding: 20px;
}

/* NAVBAR */
nav {
  background: #222;
  text-align: center;
  padding: 10px;
}

nav a {
  color: white;
  margin: 0 15px;
  text-decoration: none;
}

nav a:hover {
  color: #ffcc00;
}

/* HERO */
.hero {
  background: url('https://images.unsplash.com/photo-1555396273-367ea4eb4db5') center/cover;
  padding: 100px 20px;
  color: white;
  text-align: center;
}

.hero h2 {
  font-size: 36px;
}

.btn {
  background: red;
  padding: 12px 25px;
  color: white;
  text-decoration: none;
  border-radius: 25px;
  display: inline-block;
  margin-top: 20px;
}

/* SECTION TITLE */
.section-title {
  text-align: center;
  color: #e91e63;
  margin: 40px 0 20px;
}

/* MENU GRID */
.menu-container {
  display: flex;
  justify-content: center;
  gap: 25px;
  flex-wrap: wrap;
  padding: 20px;
}

/* CARD DESIGN */
.card {
  width: 300px;
  background: #f3f3f3;
  border-radius: 15px;
  overflow: hidden;
  box-shadow: 0 5px 15px rgba(0,0,0,0.1);
  transition: 0.3s;
}

.card img {
  width: 100%;
  height: 200px;
  object-fit: cover;
}

.card h3 {
  padding: 15px;
  color: #e91e63;
}

/* HOVER EFFECT */
.card:hover {
  transform: translateY(-10px);
}

/* CONTACT */
.contact {
  text-align: center;
  padding: 40px;
}

.contact a {
  display: inline-block;
  margin: 10px;
  padding: 12px 20px;
  border-radius: 25px;
  color: white;
  text-decoration: none;
}

.call { background: green; }
.whatsapp { background: #25D366; }

/* FOOTER */
footer {
  background: #111;
  color: white;
  text-align: center;
  padding: 15px;
}
</style>

</head>

<body>

<header>
  <h1>HOTEL SHIVAM</h1>
</header>

<nav>
  <a href="#">Home</a>
  <a href="#">Menu</a>
  <a href="#">Contact</a>
</nav>

<div class="hero">
  <h2>Stop. Eat. Smile. Repeat.</h2>
  <a href="tel:+919274579933" class="btn">Call Now</a>
</div>

<h2 class="section-title">Our Special Dishes</h2>

<div class="menu-container">

  <div class="card">
    <img src="./gu3.jpg">
    <h3>Gujarati Thali</h3>
  </div>

  <div class="card">
    <img src="./s1.webp">
    <h3>South Indian</h3>
  </div>

  <div class="card">
    <img src="./gu1.jpg">
    <h3>Snacks & Tea</h3>
  </div>

</div>

<div class="contact">
  <h2>Contact Us</h2>
  <a href="tel:+919274579933" class="call">Call</a>
  <a href="https://wa.me/919274579933" class="whatsapp">WhatsApp</a>

  <p>📍 Near Harisiddhi Mata Temple,<br>Porbandar Dwarka Highway</p>
</div>

<footer>
  <p>© 2026 Hotel Shivam</p>
</footer>

</body>
</html>
